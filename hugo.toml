baseURL = 'https://magley.github.io/'
languageCode = 'en-us'
title = "magley"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true

[languages]
  [languages.en]
    weight = 1
    languageName = "English"

  [languages.sr]
    weight = 2
    languageName = "Srpski"

[params]
title = "magley's website"

[markup.goldmark.renderer]
unsafe = true # Allow html in .md

[markup]
[markup.highlight]
noClasses = false
linenos = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "Files"
    url = "/files/"
    weight = 3

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4